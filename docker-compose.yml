services:

  postgres:
    image: postgres:16-alpine
    container_name: canva_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: canva
      POSTGRES_PASSWORD: changeme_strong_password
      POSTGRES_DB: canva_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canva -d canva_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: canva_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: changeme_minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
  backend:
    build: ./backend
    container_name: canva_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://canva:changeme_strong_password@postgres:5432/canva_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: changeme_minio_password
      MINIO_BUCKET: canva-images
      MINIO_SECURE: "false"
      MINIO_PUBLIC_URL: http://localhost:9000
      JWT_SECRET: changeme_jwt_secret_min_32_chars
      JWT_EXPIRE_MINUTES: "10080"
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: canva_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
