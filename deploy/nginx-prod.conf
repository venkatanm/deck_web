events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  resolver 127.0.0.11 valid=10s ipv6=off;

  # Backend upstream (nginx starts after backend is healthy via depends_on)
  upstream backend {
    server backend:8000;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50M;

    # React SPA — unknown routes serve index.html
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Deck Web backend API
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Doc-to-deck pipeline (variable = resolve at request time; host.docker.internal fails at startup)
    location /pipeline/ {
      set $pipeline "http://host.docker.internal:8001";
      rewrite ^/pipeline/(.*) /$1 break;
      proxy_pass $pipeline;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }
  }
}
